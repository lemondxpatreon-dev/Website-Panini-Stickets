<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini Sticker Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    color:white;
}

header{
    background:#1e1e1e;
    padding:20px;
    text-align:center;
    border-bottom:2px solid #333;
}

h1{
    color:#f5c542;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1f1f1f;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    color:#4caf50;
    font-size:20px;
    margin-top:10px;
}

button{
    background:#f5c542;
    color:black;
    border:none;
    padding:10px 15px;
    margin-top:10px;
    cursor:pointer;
    border-radius:8px;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.order-form{
    margin-top:40px;
    background:#1f1f1f;
    padding:20px;
    border-radius:12px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2a2a2a;
    color:white;
    border:1px solid #444;
    border-radius:8px;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    border-top:1px solid #333;
    color:#999;
}
</style>
</head>
<body>

<header>
    <h1>⚽ Panini Sticker Shop</h1>
    <p>Seltene Sticker kaufen & tauschen</p>
</header>

<div class="container">

    <h2>Unsere Sticker</h2>

    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/300x220" alt="">
            <div class="card-content">
                <h3>Messi Sticker</h3>
                <p>Top Zustand</p>
                <div class="price">5,00 €</div>
                <button onclick="selectProduct('Messi Sticker')">
                    Kaufen
                </button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x220" alt="">
            <div class="card-content">
                <h3>Ronaldo Sticker</h3>
                <p>Limitierte Ausgabe</p>
                <div class="price">7,00 €</div>
                <button onclick="selectProduct('Ronaldo Sticker')">
                    Kaufen
                </button>
            </div>
        </div>

    </div>

    <div class="order-form">
        <h2>Bestellung</h2>

        <input type="text" placeholder="Name" required>

        <input type="email" placeholder="E-Mail" required>

        <textarea rows="4" placeholder="Lieferadresse"></textarea>

        <input type="text" id="product" placeholder="Gewähltes Produkt" readonly>

        <button onclick="order()">
            Bestellung absenden
        </button>
    </div>

</div>

<footer>
    © 2026 Panini Sticker Shop
</footer>

<script>
function selectProduct(product){
    document.getElementById("product").value = product;
    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    });
}

function order(){
    alert(
        "Bestellung erfasst! Für echte Bestellungen benötigst du später ein Backend und einen Zahlungsanbieter."
    );
}
</script>

</body>
</html>
